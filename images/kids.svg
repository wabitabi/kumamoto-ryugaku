<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="k-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60c8f0"/>
      <stop offset="100%" stop-color="#a8e4f8"/>
    </linearGradient>
    <linearGradient id="k-grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3db845"/>
      <stop offset="100%" stop-color="#1d8025"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="400" height="300" fill="url(#k-sky)"/>

  <!-- Sun with rays -->
  <circle cx="340" cy="58" r="40" fill="#ffe830" opacity="0.9"/>
  <circle cx="340" cy="58" r="32" fill="#ffd800"/>
  <!-- Sun rays -->
  <line x1="340" y1="10"  x2="340" y2="18"  stroke="#ffe830" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="376" y1="22"  x2="370" y2="28"  stroke="#ffe830" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="388" y1="58"  x2="380" y2="58"  stroke="#ffe830" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="376" y1="94"  x2="370" y2="88"  stroke="#ffe830" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="304" y1="22"  x2="310" y2="28"  stroke="#ffe830" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="292" y1="58"  x2="300" y2="58"  stroke="#ffe830" stroke-width="4" stroke-linecap="round" opacity="0.7"/>

  <!-- Clouds -->
  <ellipse cx="85"  cy="68" rx="52" ry="22" fill="white" opacity="0.9"/>
  <ellipse cx="110" cy="58" rx="36" ry="20" fill="white" opacity="0.9"/>
  <ellipse cx="60"  cy="72" rx="32" ry="18" fill="white" opacity="0.85"/>

  <ellipse cx="250" cy="50" rx="42" ry="18" fill="white" opacity="0.85"/>
  <ellipse cx="270" cy="42" rx="30" ry="16" fill="white" opacity="0.85"/>

  <!-- Grass -->
  <path d="M0,230 Q100,215 200,228 Q300,241 400,225 L400,300 L0,300 Z" fill="url(#k-grass)"/>
  <path d="M0,248 Q120,236 240,248 Q320,257 400,242 L400,300 L0,300 Z" fill="#2d9a30" opacity="0.8"/>

  <!-- Children silhouettes (simple, cheerful) -->
  <!-- Child 1 (jumping, left) -->
  <circle cx="130" cy="162" r="18" fill="#f5a850"/>
  <path d="M130,180 L130,225" stroke="#3a3a3a" stroke-width="10" stroke-linecap="round"/>
  <!-- Arms up (jumping) -->
  <path d="M130,195 L105,175" stroke="#3a3a3a" stroke-width="8" stroke-linecap="round"/>
  <path d="M130,195 L155,175" stroke="#3a3a3a" stroke-width="8" stroke-linecap="round"/>
  <!-- Legs apart -->
  <path d="M130,225 L112,255" stroke="#3a3a3a" stroke-width="8" stroke-linecap="round"/>
  <path d="M130,225 L148,255" stroke="#3a3a3a" stroke-width="8" stroke-linecap="round"/>

  <!-- Child 2 (standing, center) -->
  <circle cx="210" cy="155" r="20" fill="#f08030"/>
  <path d="M210,175 L210,225" stroke="#3a3a3a" stroke-width="11" stroke-linecap="round"/>
  <path d="M210,195 L185,210" stroke="#3a3a3a" stroke-width="9" stroke-linecap="round"/>
  <path d="M210,195 L235,210" stroke="#3a3a3a" stroke-width="9" stroke-linecap="round"/>
  <path d="M210,225 L195,258" stroke="#3a3a3a" stroke-width="9" stroke-linecap="round"/>
  <path d="M210,225 L225,258" stroke="#3a3a3a" stroke-width="9" stroke-linecap="round"/>

  <!-- Child 3 (right, waving) -->
  <circle cx="285" cy="165" r="17" fill="#e87050"/>
  <path d="M285,182 L285,228" stroke="#3a3a3a" stroke-width="9" stroke-linecap="round"/>
  <path d="M285,198 L262,215" stroke="#3a3a3a" stroke-width="8" stroke-linecap="round"/>
  <!-- Waving arm up -->
  <path d="M285,198 L305,172" stroke="#3a3a3a" stroke-width="8" stroke-linecap="round"/>
  <path d="M285,228 L270,258" stroke="#3a3a3a" stroke-width="8" stroke-linecap="round"/>
  <path d="M285,228 L300,258" stroke="#3a3a3a" stroke-width="8" stroke-linecap="round"/>

  <!-- Stars / sparkles -->
  <text x="170" y="140" font-size="16" fill="#ffe830" opacity="0.9">✦</text>
  <text x="245" y="130" font-size="12" fill="#ffe830" opacity="0.8">✦</text>

  <!-- Text -->
  <rect x="0" y="258" width="400" height="42" fill="rgba(0,0,0,0.5)"/>
  <text x="200" y="280" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="24" font-weight="700" fill="white">キッズ留学</text>
  <text x="200" y="295" text-anchor="middle" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.8)" letter-spacing="2">KIDS STUDY ABROAD</text>
</svg>
