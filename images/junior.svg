<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="j-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a4a8a"/>
      <stop offset="100%" stop-color="#2d70cc"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#j-bg)"/>

  <!-- Stars -->
  <circle cx="40"  cy="28" r="1.8" fill="white" opacity="0.8"/>
  <circle cx="100" cy="18" r="1.4" fill="white" opacity="0.7"/>
  <circle cx="160" cy="32" r="1.6" fill="white" opacity="0.75"/>
  <circle cx="320" cy="20" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="360" cy="40" r="1.4" fill="white" opacity="0.7"/>
  <circle cx="80"  cy="55" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="280" cy="35" r="1.6" fill="white" opacity="0.75"/>

  <!-- Open book large (center) -->
  <!-- Left page -->
  <path d="M90,85 Q90,75 105,72 L200,78 L200,205 Q105,198 90,208 Z" fill="#f8f2e8" opacity="0.95"/>
  <!-- Right page -->
  <path d="M200,78 L295,72 Q310,75 310,85 L310,208 Q295,198 200,205 Z" fill="#f0e8d5" opacity="0.95"/>
  <!-- Spine -->
  <line x1="200" y1="78" x2="200" y2="205" stroke="#c8b888" stroke-width="4" opacity="0.8"/>

  <!-- Left page content: math / science -->
  <text x="140" y="112" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a3a6a" font-weight="700">夏休み</text>
  <text x="140" y="128" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#2a5aaa">短期留学</text>
  <line x1="105" y1="140" x2="192" y2="140" stroke="#aaa" stroke-width="1.5" opacity="0.5"/>
  <line x1="105" y1="152" x2="192" y2="152" stroke="#aaa" stroke-width="1.5" opacity="0.5"/>
  <line x1="105" y1="164" x2="180" y2="164" stroke="#aaa" stroke-width="1.5" opacity="0.5"/>
  <line x1="105" y1="176" x2="192" y2="176" stroke="#aaa" stroke-width="1.5" opacity="0.5"/>
  <!-- Doodle -->
  <circle cx="120" cy="158" r="8" fill="none" stroke="#e05a50" stroke-width="1.5" opacity="0.6"/>
  <text x="155" y="197" font-family="sans-serif" font-size="9" fill="#aaa" opacity="0.7">←ひかりセンセイ</text>

  <!-- Right page content -->
  <text x="255" y="112" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#1a3a6a" font-weight="700">英語で話す!</text>
  <!-- Simple globe drawing -->
  <circle cx="255" cy="152" r="32" fill="#c8e0f8" opacity="0.8"/>
  <ellipse cx="255" cy="152" rx="32" ry="13" fill="none" stroke="#2a60a8" stroke-width="1.5" opacity="0.5"/>
  <line x1="255" y1="120" x2="255" y2="184" stroke="#2a60a8" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="255" cy="140" rx="22" ry="9" fill="#4a9040" opacity="0.5"/>
  <ellipse cx="255" cy="163" rx="18" ry="7" fill="#4a9040" opacity="0.4"/>

  <!-- Pencil -->
  <rect x="318" y="130" width="10" height="75" rx="3" fill="#f5c030" transform="rotate(-18,318,130)"/>
  <path d="M322,127 L328,127 L325,112 Z" fill="#e83820" transform="rotate(-18,318,130)"/>
  <rect x="318" y="198" width="10" height="8" rx="2" fill="#d4a080" transform="rotate(-18,318,130)"/>

  <!-- Text -->
  <rect x="0" y="258" width="400" height="42" fill="rgba(0,0,0,0.5)"/>
  <text x="200" y="280" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="24" font-weight="700" fill="white">中学生留学</text>
  <text x="200" y="295" text-anchor="middle" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.8)" letter-spacing="2">JUNIOR HIGH SCHOOL</text>
</svg>
