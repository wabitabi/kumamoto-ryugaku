<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="w-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1e3c"/>
      <stop offset="60%" stop-color="#1a3c6e"/>
      <stop offset="100%" stop-color="#2a5aaa"/>
    </linearGradient>
    <linearGradient id="w-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0a820" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e87020" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#w-bg)"/>

  <!-- City night glow -->
  <ellipse cx="200" cy="300" rx="250" ry="80" fill="#e87020" opacity="0.08"/>

  <!-- Stars -->
  <circle cx="30"  cy="18" r="1.6" fill="white" opacity="0.85"/>
  <circle cx="80"  cy="10" r="1.3" fill="white" opacity="0.8"/>
  <circle cx="155" cy="22" r="1.5" fill="white" opacity="0.75"/>
  <circle cx="240" cy="14" r="1.4" fill="white" opacity="0.8"/>
  <circle cx="320" cy="20" r="1.6" fill="white" opacity="0.85"/>
  <circle cx="370" cy="8"  r="1.4" fill="white" opacity="0.8"/>
  <circle cx="55"  cy="45" r="1.2" fill="white" opacity="0.65"/>
  <circle cx="350" cy="42" r="1.3" fill="white" opacity="0.7"/>

  <!-- Moon -->
  <circle cx="330" cy="52" r="28" fill="#fff8d0" opacity="0.85"/>
  <circle cx="340" cy="44" r="22" fill="#0a1e3c" opacity="0.7"/>

  <!-- Building silhouettes -->
  <rect x="0"   y="168" width="42" height="132" fill="#06102a" opacity="0.95"/>
  <rect x="40"  y="140" width="32" height="160" fill="#06102a" opacity="0.93"/>
  <rect x="70"  y="158" width="24" height="142" fill="#06102a" opacity="0.9"/>
  <rect x="304" y="152" width="50" height="148" fill="#06102a" opacity="0.95"/>
  <rect x="350" y="135" width="35" height="165" fill="#06102a" opacity="0.93"/>
  <rect x="380" y="162" width="20" height="138" fill="#06102a" opacity="0.9"/>
  <!-- Windows -->
  <rect x="5"   y="178" width="6" height="5" fill="#ffe840" opacity="0.7"/>
  <rect x="15"  y="178" width="6" height="5" fill="#ffe840" opacity="0.5"/>
  <rect x="25"  y="178" width="6" height="5" fill="#ffe840" opacity="0.6"/>
  <rect x="5"   y="190" width="6" height="5" fill="#ffe840" opacity="0.4"/>
  <rect x="25"  y="190" width="6" height="5" fill="#ffe840" opacity="0.6"/>
  <rect x="45"  y="150" width="6" height="5" fill="#ffe840" opacity="0.7"/>
  <rect x="55"  y="150" width="6" height="5" fill="#ffe840" opacity="0.5"/>
  <rect x="45"  y="162" width="6" height="5" fill="#ffe840" opacity="0.6"/>
  <rect x="55"  y="174" width="6" height="5" fill="#ffe840" opacity="0.7"/>
  <rect x="308" y="162" width="6" height="5" fill="#ffe840" opacity="0.65"/>
  <rect x="320" y="162" width="6" height="5" fill="#ffe840" opacity="0.5"/>
  <rect x="332" y="162" width="6" height="5" fill="#ffe840" opacity="0.6"/>
  <rect x="308" y="174" width="6" height="5" fill="#ffe840" opacity="0.4"/>
  <rect x="344" y="162" width="6" height="5" fill="#ffe840" opacity="0.55"/>
  <rect x="355" y="145" width="5" height="5" fill="#ffe840" opacity="0.7"/>
  <rect x="365" y="145" width="5" height="5" fill="#ffe840" opacity="0.6"/>
  <rect x="355" y="157" width="5" height="5" fill="#ffe840" opacity="0.5"/>

  <!-- Business person with briefcase (center) -->
  <circle cx="200" cy="148" r="22" fill="#d09065" opacity="0.9"/>
  <!-- Suit -->
  <path d="M178,170 L178,230 L222,230 L222,170 Q210,162 200,170 Q190,162 178,170 Z" fill="#1a2a5c" opacity="0.92"/>
  <!-- Tie -->
  <path d="M197,170 L200,210 L203,170 Z" fill="#c82020" opacity="0.8"/>
  <!-- Briefcase -->
  <rect x="228" y="200" width="40" height="30" rx="4" fill="#8a6030" opacity="0.9"/>
  <rect x="238" y="195" width="20" height="7" rx="3" fill="#6a4820" opacity="0.85"/>
  <line x1="228" y1="215" x2="268" y2="215" stroke="#6a4820" stroke-width="2" opacity="0.7"/>
  <rect x="245" y="209" width="8" height="12" rx="2" fill="#a07840" opacity="0.8"/>
  <!-- Arms -->
  <path d="M222,185 L238,200" stroke="#1a2a5c" stroke-width="11" stroke-linecap="round" opacity="0.9"/>
  <path d="M178,185 L160,200" stroke="#1a2a5c" stroke-width="11" stroke-linecap="round" opacity="0.9"/>
  <!-- Legs -->
  <path d="M185,230 L182,265" stroke="#0d1a40" stroke-width="11" stroke-linecap="round" opacity="0.9"/>
  <path d="M215,230 L218,265" stroke="#0d1a40" stroke-width="11" stroke-linecap="round" opacity="0.9"/>

  <!-- World map hint (faint) -->
  <text x="110" y="230" font-family="sans-serif" font-size="10" fill="white" opacity="0.12" letter-spacing="1">WORLD</text>
  <text x="260" y="230" font-family="sans-serif" font-size="10" fill="white" opacity="0.12" letter-spacing="1">CAREER</text>

  <!-- Text -->
  <rect x="0" y="258" width="400" height="42" fill="rgba(0,0,0,0.55)"/>
  <text x="200" y="280" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="24" font-weight="700" fill="white">社会人・シニア留学</text>
  <text x="200" y="295" text-anchor="middle" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.8)" letter-spacing="2">WORKING ADULT ABROAD</text>
</svg>
