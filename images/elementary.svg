<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="el-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdf0b0"/>
      <stop offset="100%" stop-color="#f5d860"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#el-bg)"/>

  <!-- Sky blue top -->
  <rect width="400" height="170" fill="#70c8f0"/>

  <!-- Sun -->
  <circle cx="340" cy="55" r="42" fill="#ffe830" opacity="0.9"/>
  <circle cx="340" cy="55" r="34" fill="#ffd000"/>

  <!-- Clouds -->
  <ellipse cx="90"  cy="58" rx="50" ry="20" fill="white" opacity="0.9"/>
  <ellipse cx="116" cy="48" rx="36" ry="18" fill="white" opacity="0.9"/>
  <ellipse cx="68"  cy="62" rx="30" ry="16" fill="white" opacity="0.85"/>
  <ellipse cx="240" cy="42" rx="40" ry="16" fill="white" opacity="0.8"/>
  <ellipse cx="262" cy="35" rx="28" ry="14" fill="white" opacity="0.8"/>

  <!-- Grass -->
  <path d="M0,165 Q100,150 200,165 Q300,180 400,162 L400,300 L0,300 Z" fill="#3ab840"/>
  <path d="M0,182 Q120,170 240,182 Q320,190 400,175 L400,300 L0,300 Z" fill="#2a9830" opacity="0.85"/>

  <!-- Schoolbag -->
  <rect x="142" y="118" width="116" height="105" rx="14" fill="#e83838" opacity="0.9"/>
  <rect x="152" y="108" width="96" height="28"  rx="10" fill="#c82020" opacity="0.85"/>
  <!-- Strap -->
  <path d="M168,108 Q165,82 180,75 Q195,68 200,75 Q205,68 220,75 Q235,82 232,108" fill="none" stroke="#c82020" stroke-width="10" stroke-linecap="round"/>
  <!-- Pocket -->
  <rect x="162" y="152" width="76" height="44" rx="8" fill="#c82020" opacity="0.8"/>
  <!-- Buckle -->
  <rect x="188" y="168" width="24" height="12" rx="4" fill="#d4a020" opacity="0.9"/>
  <circle cx="200" cy="174" r="4" fill="#a07010"/>
  <!-- Stars on bag -->
  <text x="158" y="142" font-size="14" fill="#ffe830" opacity="0.8">★</text>
  <text x="220" y="142" font-size="14" fill="#ffe830" opacity="0.8">★</text>

  <!-- Text -->
  <rect x="0" y="258" width="400" height="42" fill="rgba(0,0,0,0.5)"/>
  <text x="200" y="280" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="24" font-weight="700" fill="white">小学生留学</text>
  <text x="200" y="295" text-anchor="middle" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.8)" letter-spacing="2">ELEMENTARY SCHOOL</text>
</svg>
