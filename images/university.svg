<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="u-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c0a5c"/>
      <stop offset="50%" stop-color="#3820a0"/>
      <stop offset="100%" stop-color="#6040d0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#u-bg)"/>

  <!-- Stars -->
  <circle cx="25"  cy="20" r="1.8" fill="white" opacity="0.9"/>
  <circle cx="70"  cy="12" r="1.5" fill="white" opacity="0.85"/>
  <circle cx="140" cy="25" r="1.6" fill="white" opacity="0.8"/>
  <circle cx="210" cy="15" r="1.4" fill="white" opacity="0.75"/>
  <circle cx="290" cy="22" r="1.7" fill="white" opacity="0.85"/>
  <circle cx="355" cy="10" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="382" cy="32" r="1.3" fill="white" opacity="0.8"/>
  <circle cx="55"  cy="48" r="1.3" fill="white" opacity="0.7"/>
  <circle cx="320" cy="44" r="1.4" fill="white" opacity="0.75"/>

  <!-- University building silhouette -->
  <!-- Main building -->
  <rect x="120" y="145" width="160" height="120" fill="#0d0830" opacity="0.9"/>
  <!-- Columns -->
  <rect x="130" y="155" width="14" height="110" fill="#1a1250" opacity="0.8"/>
  <rect x="150" y="155" width="14" height="110" fill="#1a1250" opacity="0.8"/>
  <rect x="225" y="155" width="14" height="110" fill="#1a1250" opacity="0.8"/>
  <rect x="245" y="155" width="14" height="110" fill="#1a1250" opacity="0.8"/>
  <!-- Pediment -->
  <path d="M115,148 L200,105 L285,148 Z" fill="#0d0830" opacity="0.9"/>
  <!-- Dome -->
  <path d="M175,108 Q200,75 225,108 Z" fill="#0d0830" opacity="0.9"/>
  <line x1="200" y1="75" x2="200" y2="65" stroke="#0d0830" stroke-width="4" opacity="0.9"/>
  <circle cx="200" cy="62" r="6" fill="#0d0830" opacity="0.9"/>
  <!-- Windows with light -->
  <rect x="145" y="170" width="20" height="25" rx="2" fill="#ffe890" opacity="0.6"/>
  <rect x="178" y="170" width="20" height="25" rx="2" fill="#ffe890" opacity="0.55"/>
  <rect x="202" y="170" width="20" height="25" rx="2" fill="#ffe890" opacity="0.6"/>
  <rect x="235" y="170" width="20" height="25" rx="2" fill="#ffe890" opacity="0.5"/>
  <!-- Door -->
  <rect x="185" y="220" width="30" height="45" rx="3" fill="#ffe890" opacity="0.4"/>

  <!-- Graduation cap (floating) -->
  <rect x="48" y="88" width="50" height="9" rx="2" fill="#e8c820" opacity="0.9"/>
  <path d="M73,68 L98,88 L48,88 Z" fill="#e8c820" opacity="0.9"/>
  <line x1="98" y1="88" x2="102" y2="115" stroke="#e8c820" stroke-width="3" opacity="0.85"/>
  <circle cx="102" cy="118" r="5" fill="#e83838" opacity="0.85"/>

  <!-- Diploma scroll -->
  <rect x="305" y="115" width="65" height="48" rx="8" fill="#f5e8c8" opacity="0.88"/>
  <rect x="295" y="118" width="12" height="42" rx="5" fill="#e8d0a8" opacity="0.85"/>
  <rect x="370" y="118" width="12" height="42" rx="5" fill="#e8d0a8" opacity="0.85"/>
  <line x1="310" y1="130" x2="365" y2="130" stroke="#c8a050" stroke-width="1.5" opacity="0.5"/>
  <line x1="310" y1="140" x2="365" y2="140" stroke="#c8a050" stroke-width="1.5" opacity="0.5"/>
  <text x="337" y="154" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#8a6020" opacity="0.7">CERTIFICATE</text>
  <!-- Seal -->
  <circle cx="337" cy="148" r="6" fill="#e83030" opacity="0.6"/>

  <!-- Aurora borealis hint -->
  <path d="M0,80 Q100,55 200,75 Q300,95 400,68" fill="none" stroke="#50e8b0" stroke-width="18" opacity="0.08"/>
  <path d="M0,95 Q100,72 200,90 Q300,108 400,85" fill="none" stroke="#7060f0" stroke-width="14" opacity="0.07"/>

  <!-- Text -->
  <rect x="0" y="258" width="400" height="42" fill="rgba(0,0,0,0.55)"/>
  <text x="200" y="280" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="24" font-weight="700" fill="white">大学生留学</text>
  <text x="200" y="295" text-anchor="middle" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.8)" letter-spacing="2">UNIVERSITY ABROAD</text>
</svg>
