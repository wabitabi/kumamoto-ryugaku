<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="i-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d2444"/>
      <stop offset="100%" stop-color="#1a4a7a"/>
    </linearGradient>
    <linearGradient id="i-screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1e3c"/>
      <stop offset="100%" stop-color="#0d2a50"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#i-bg)"/>

  <!-- City skyline silhouette (night) -->
  <!-- Buildings -->
  <rect x="0"   y="180" width="38" height="120" fill="#0a1830" opacity="0.9"/>
  <rect x="36"  y="155" width="28" height="145" fill="#0a1830" opacity="0.88"/>
  <rect x="62"  y="170" width="20" height="130" fill="#0a1830" opacity="0.85"/>
  <!-- Window lights in buildings -->
  <rect x="5"   y="190" width="6" height="5" fill="#ffe840" opacity="0.7"/>
  <rect x="15"  y="190" width="6" height="5" fill="#ffe840" opacity="0.6"/>
  <rect x="5"   y="202" width="6" height="5" fill="#ffe840" opacity="0.5"/>
  <rect x="25"  y="202" width="6" height="5" fill="#ffe840" opacity="0.6"/>
  <rect x="40"  y="165" width="5" height="4" fill="#ffe840" opacity="0.7"/>
  <rect x="50"  y="165" width="5" height="4" fill="#ffe840" opacity="0.6"/>
  <rect x="40"  y="175" width="5" height="4" fill="#ffe840" opacity="0.5"/>

  <rect x="310" y="160" width="45" height="140" fill="#0a1830" opacity="0.9"/>
  <rect x="352" y="140" width="30" height="160" fill="#0a1830" opacity="0.88"/>
  <rect x="375" y="175" width="25" height="125" fill="#0a1830" opacity="0.85"/>
  <rect x="315" y="170" width="6" height="5" fill="#ffe840" opacity="0.7"/>
  <rect x="327" y="170" width="6" height="5" fill="#ffe840" opacity="0.6"/>
  <rect x="339" y="170" width="6" height="5" fill="#ffe840" opacity="0.5"/>
  <rect x="315" y="182" width="6" height="5" fill="#ffe840" opacity="0.6"/>
  <rect x="354" y="150" width="5" height="4" fill="#ffe840" opacity="0.7"/>
  <rect x="364" y="150" width="5" height="4" fill="#ffe840" opacity="0.6"/>

  <!-- Laptop / monitor -->
  <rect x="100" y="120" width="200" height="130" rx="8" fill="#1a3a5c" opacity="0.95"/>
  <!-- Screen -->
  <rect x="110" y="130" width="180" height="108" rx="4" fill="url(#i-screen)"/>

  <!-- Screen content: chart -->
  <polyline points="122,216 148,195 172,202 198,172 224,178 248,148 274,155" fill="none" stroke="#3af0a0" stroke-width="2.5" stroke-linejoin="round"/>
  <circle cx="148" cy="195" r="3.5" fill="#3af0a0"/>
  <circle cx="198" cy="172" r="3.5" fill="#3af0a0"/>
  <circle cx="248" cy="148" r="3.5" fill="#3af0a0"/>
  <!-- Chart fill -->
  <path d="M122,216 L148,195 L172,202 L198,172 L224,178 L248,148 L274,155 L274,220 L122,220 Z" fill="#3af0a0" opacity="0.08"/>
  <!-- Grid lines -->
  <line x1="122" y1="200" x2="274" y2="200" stroke="white" stroke-width="0.7" opacity="0.12"/>
  <line x1="122" y1="180" x2="274" y2="180" stroke="white" stroke-width="0.7" opacity="0.12"/>
  <line x1="122" y1="160" x2="274" y2="160" stroke="white" stroke-width="0.7" opacity="0.12"/>
  <!-- Bar chart (background) -->
  <rect x="124" y="190" width="16" height="30" fill="#2060a0" opacity="0.4" rx="2"/>
  <rect x="145" y="180" width="16" height="40" fill="#2060a0" opacity="0.35" rx="2"/>
  <rect x="166" y="185" width="16" height="35" fill="#2060a0" opacity="0.3" rx="2"/>
  <rect x="187" y="165" width="16" height="55" fill="#2060a0" opacity="0.35" rx="2"/>
  <rect x="208" y="170" width="16" height="50" fill="#2060a0" opacity="0.3" rx="2"/>
  <rect x="229" y="148" width="16" height="72" fill="#2060a0" opacity="0.35" rx="2"/>
  <rect x="250" y="155" width="16" height="65" fill="#2060a0" opacity="0.3" rx="2"/>

  <!-- Pie chart (top right of screen) -->
  <path d="M262,148 A22,22 0 0,1 280,162 L262,162 Z" fill="#3af0a0" opacity="0.7"/>
  <path d="M262,162 A22,22 0 1,1 262,140 L262,162 Z" fill="#4aa0e0" opacity="0.6"/>

  <!-- Laptop stand -->
  <path d="M180,250 L220,250 L230,265 L170,265 Z" fill="#1a3a5c" opacity="0.9"/>
  <rect x="165" y="265" width="70" height="6" rx="3" fill="#0d2a4c" opacity="0.9"/>

  <!-- Person hint (tie) -->
  <circle cx="200" cy="95" r="18" fill="#d4956a" opacity="0.8"/>
  <path d="M196,113 L200,145 L204,113 Z" fill="#cc3030" opacity="0.7"/>

  <!-- Floating icons -->
  <text x="46"  y="140" font-size="20" fill="#3af0a0" opacity="0.5">$</text>
  <text x="350" y="135" font-size="18" fill="#4aa0e0" opacity="0.5">✉</text>

  <!-- Text -->
  <rect x="0" y="258" width="400" height="42" fill="rgba(0,0,0,0.55)"/>
  <text x="200" y="280" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="24" font-weight="700" fill="white">インターン×自己分析</text>
  <text x="200" y="295" text-anchor="middle" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.8)" letter-spacing="2">INTERNSHIP ABROAD</text>
</svg>
