<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="e-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a3d6b"/>
      <stop offset="100%" stop-color="#1a7aaa"/>
    </linearGradient>
    <linearGradient id="e-book" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#e8dfc8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#e-bg)"/>

  <!-- Decorative circles -->
  <circle cx="370" cy="30"  r="80" fill="white" opacity="0.04"/>
  <circle cx="30"  cy="280" r="100" fill="white" opacity="0.04"/>

  <!-- Speech bubble 1 -->
  <rect x="40" y="38" width="145" height="62" rx="14" fill="white" opacity="0.92"/>
  <path d="M68,100 L55,118 L88,100 Z" fill="white" opacity="0.92"/>
  <text x="112" y="62"  text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#0a3d6b">Nice to meet you!</text>
  <text x="112" y="78"  text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0a3d6b">I'm from Kumamoto.</text>
  <text x="112" y="93"  text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0a3d6b">はじめまして！</text>

  <!-- Speech bubble 2 -->
  <rect x="215" y="48" width="148" height="56" rx="14" fill="#ffe680" opacity="0.92"/>
  <path d="M332,104 L348,120 L320,104 Z" fill="#ffe680" opacity="0.92"/>
  <text x="289" y="72" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#3a2000">What a great smile!</text>
  <text x="289" y="88" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#3a2000">Tell me about Japan 🎌</text>

  <!-- Open book -->
  <g transform="translate(110,130)">
    <!-- Left page -->
    <path d="M0,0 Q-70,-8 -90,10 L-90,95 Q-70,80 0,88 Z" fill="url(#e-book)" opacity="0.95"/>
    <!-- Right page -->
    <path d="M0,0 Q70,-8 90,10 L90,95 Q70,80 0,88 Z" fill="#f0e8d0" opacity="0.95"/>
    <!-- Spine shadow -->
    <line x1="0" y1="0" x2="0" y2="88" stroke="#c8b888" stroke-width="3"/>
    <!-- Lines on left page -->
    <line x1="-75" y1="30" x2="-12" y2="28" stroke="#aaa" stroke-width="1.5" opacity="0.5"/>
    <line x1="-75" y1="42" x2="-12" y2="40" stroke="#aaa" stroke-width="1.5" opacity="0.5"/>
    <line x1="-75" y1="54" x2="-12" y2="52" stroke="#aaa" stroke-width="1.5" opacity="0.5"/>
    <line x1="-75" y1="66" x2="-12" y2="64" stroke="#aaa" stroke-width="1.5" opacity="0.5"/>
    <!-- Lines on right page -->
    <line x1="12" y1="30" x2="75" y2="28" stroke="#aaa" stroke-width="1.5" opacity="0.5"/>
    <line x1="12" y1="42" x2="75" y2="40" stroke="#aaa" stroke-width="1.5" opacity="0.5"/>
    <line x1="12" y1="54" x2="75" y2="52" stroke="#aaa" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Globe -->
  <circle cx="310" cy="195" r="52" fill="#1a6ea8" opacity="0.85"/>
  <circle cx="310" cy="195" r="52" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <!-- Latitude lines -->
  <ellipse cx="310" cy="195" rx="52" ry="20" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  <ellipse cx="310" cy="178" rx="42" ry="13" fill="none" stroke="white" stroke-width="1" opacity="0.25"/>
  <ellipse cx="310" cy="212" rx="42" ry="13" fill="none" stroke="white" stroke-width="1" opacity="0.25"/>
  <!-- Longitude -->
  <line x1="310" y1="143" x2="310" y2="247" stroke="white" stroke-width="1" opacity="0.3"/>
  <path d="M310,143 Q350,175 350,195 Q350,215 310,247" fill="none" stroke="white" stroke-width="1" opacity="0.25"/>
  <path d="M310,143 Q270,175 270,195 Q270,215 310,247" fill="none" stroke="white" stroke-width="1" opacity="0.25"/>
  <!-- Land mass hint -->
  <ellipse cx="318" cy="183" rx="18" ry="12" fill="#2d9a40" opacity="0.6" transform="rotate(-20,318,183)"/>
  <ellipse cx="298" cy="205" rx="14" ry="9" fill="#2d9a40" opacity="0.6" transform="rotate(15,298,205)"/>

  <!-- ABC letters floating -->
  <text x="52" y="210" font-family="sans-serif" font-size="32" font-weight="900" fill="white" opacity="0.18">A</text>
  <text x="25"  y="255" font-family="sans-serif" font-size="24" font-weight="900" fill="white" opacity="0.13">B</text>

  <!-- Text -->
  <rect x="0" y="258" width="400" height="42" fill="rgba(0,0,0,0.5)"/>
  <text x="200" y="280" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="24" font-weight="700" fill="white">英語留学</text>
  <text x="200" y="295" text-anchor="middle" font-family="sans-serif" font-size="12" fill="rgba(255,255,255,0.8)" letter-spacing="2">ENGLISH STUDY ABROAD</text>
</svg>
