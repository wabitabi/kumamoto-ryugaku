<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="h-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3c6e"/>
      <stop offset="40%" stop-color="#c04a1a"/>
      <stop offset="70%" stop-color="#e87a20"/>
      <stop offset="100%" stop-color="#f5b040"/>
    </linearGradient>
    <linearGradient id="h-sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f5c8a"/>
      <stop offset="100%" stop-color="#08324a"/>
    </linearGradient>
  </defs>

  <!-- Sky (sunset) -->
  <rect width="400" height="300" fill="url(#h-sky)"/>

  <!-- Sun setting on horizon -->
  <circle cx="200" cy="185" r="52" fill="#f5c518" opacity="0.9"/>
  <circle cx="200" cy="185" r="44" fill="#f0a010"/>

  <!-- Stars -->
  <circle cx="50"  cy="30" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="90"  cy="18" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="140" cy="25" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="340" cy="22" r="1.3" fill="white" opacity="0.8"/>
  <circle cx="370" cy="42" r="1.5" fill="white" opacity="0.7"/>

  <!-- Sea -->
  <path d="M0,185 Q100,175 200,185 Q300,195 400,185 L400,300 L0,300 Z" fill="url(#h-sea)"/>
  <!-- Sun reflection -->
  <ellipse cx="200" cy="220" rx="20" ry="50" fill="#f5c518" opacity="0.25"/>

  <!-- Wave -->
  <path d="M0,182 Q40,176 80,182 Q120,188 160,182 Q200,176 240,182 Q280,188 320,182 Q360,176 400,182" fill="none" stroke="white" stroke-width="2" opacity="0.3"/>

  <!-- Volcano / Diamond Head silhouette -->
  <path d="M260,190 L310,130 L360,190 Z" fill="#1a1a2e" opacity="0.85"/>
  <path d="M300,190 L340,145 L380,190 Z" fill="#1a1a2e" opacity="0.8"/>
  <!-- Lava glow -->
  <circle cx="310" cy="128" r="8" fill="#ff5500" opacity="0.6"/>

  <!-- Palm silhouette -->
  <rect x="72" y="150" width="8" height="110" rx="3" fill="#0d1a0d"/>
  <ellipse cx="76" cy="143" rx="38" ry="24" fill="#0d2a0d" opacity="0.9"/>
  <ellipse cx="56" cy="137" rx="28" ry="13" fill="#0d2a0d" opacity="0.85" transform="rotate(-28,56,137)"/>
  <ellipse cx="96" cy="137" rx="28" ry="13" fill="#0d2a0d" opacity="0.85" transform="rotate(28,96,137)"/>

  <!-- Hibiscus hint -->
  <circle cx="330" cy="100" r="10" fill="#c82828" opacity="0.7"/>
  <circle cx="320" cy="93"  r="8"  fill="#e83838" opacity="0.6"/>

  <!-- Text -->
  <rect x="0" y="248" width="400" height="52" fill="rgba(0,0,0,0.5)"/>
  <text x="200" y="272" text-anchor="middle" font-family="'Noto Sans JP',sans-serif" font-size="26" font-weight="700" fill="white">ハワイ（アメリカ）</text>
  <text x="200" y="291" text-anchor="middle" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.8)" letter-spacing="2">HAWAII · U.S.A.</text>
</svg>
